kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - {containerPort: 30001, hostPort: 30001, protocol: TCP}   # backend NodePort -> host:30001
  - {containerPort: 30002, hostPort: 7799,  protocol: TCP}   # frontend NodePort -> host:7799 (nginx algo.xskill.wiki upstream)
