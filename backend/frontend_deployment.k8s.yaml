# Frontend (Streamlit) Deployment + NodePort Service for the kind cluster.
# NodePort 30002 -> kind maps to host:7799 -> nginx algo.xskill.wiki upstream.
# Streamlit CORS/XSRF disabled (else white-screen behind the proxy); talks to
# the backend in-cluster via leaderboard-api-svc:80; browser-side log streaming
# uses the public https domain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-ui
  namespace: leaderboard
  labels:
    app: leaderboard-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaderboard-ui
  template:
    metadata:
      labels:
        app: leaderboard-ui
    spec:
      containers:
      - name: ui
        image: localhost:5000/leaderboard-ui:v2-k8s
        imagePullPolicy: Never
        command: ["streamlit","run","app.py",
          "--server.port=8501","--server.address=0.0.0.0","--server.headless=true",
          "--browser.gatherUsageStats=false",
          "--server.enableCORS=false","--server.enableXsrfProtection=false",
          "--server.enableWebsocketCompression=false"]
        ports:
        - containerPort: 8501
        env:
        - {name: API_BASE_URL, value: "http://leaderboard-api-svc:80"}
        - {name: PUBLIC_BASE_URL, value: "https://algo.xskill.wiki"}
        - {name: LB_RANK_REFRESH_MS, value: "30000"}
        - {name: LB_LIST_REFRESH_MS, value: "15000"}
        - {name: LB_QUEUE_REFRESH_MS, value: "15000"}
        - {name: LB_HOME_TOP5_REFRESH_MS, value: "30000"}
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-ui-svc
  namespace: leaderboard
spec:
  type: NodePort
  selector:
    app: leaderboard-ui
  ports:
  - {protocol: TCP, port: 80, targetPort: 8501, nodePort: 30002}
