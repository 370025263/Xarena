apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-api # Deployment 的名字
  namespace: leaderboard # <-- 添加
  labels:
    app: leaderboard-api
spec:
  replicas: 1 # 我们先只运行 1 个副本
  selector:
    matchLabels:
      app: leaderboard-api # 标签选择器，必须和下面的 Pod 模板标签一致
  template: # Pod 的模板
    metadata:
      labels:
        app: leaderboard-api # Pod 的标签
    spec:
      # 关键：指定 Pod 使用我们创建的 ServiceAccount
      # 这样这个 Pod 才有权去创建 Job
      serviceAccountName: leaderboard-api-sa
      containers:
      - name: api-server
        # 关键：使用你推送到本地 Registry 的镜像
        image: localhost:5000/leaderboard-api:v1
        # 总是拉取镜像，确保 K8s 使用最新版（在开发时很有用）
        imagePullPolicy: Always
        ports:
        - containerPort: 8000 # Gunicorn 运行在 8000 端口
        # --- 环境变量 ---
        env:
        - name: DATABASE_URL
          # 告诉 Flask app 数据库在容器内的 /db/leaderboard.db
          value: "sqlite:////db/leaderboard.db"
        - name: K8S_NAMESPACE
          value: "leaderboard" # 告诉 app 在哪个 namespace 创建 Job
        - name: no_proxy
          # 告诉 Pod 忽略所有 K8s 内部服务的代理
          value: "localhost,127.0.0.1,.svc,.svc.cluster.local"
        - name: NO_PROXY
          # (同时设置大写版本，确保所有库都兼容)
          value: "localhost,127.0.0.1,.svc,.svc.cluster.local"

        # -------------------------------
        # ✅ [新增] Agent 外部 LLM 配置（只对 LLM 生效，不污染 K8s API/内部请求）
        # -------------------------------
        - name: AGENT_LLM_BASE_URL
          # 必须 HTTPS（外部服务通常强制重定向/安全要求）
          # 例：阿里云百炼 OpenAI 兼容接口 base（注意不要写到 /chat/completions，写到 /v1 即可）
          value: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        - name: AGENT_LLM_MODEL
          # 你要用的模型名（按你百炼/DeepSeek 的实际模型 ID 填）
          value: "deepseek-v3.2"
        - name: AGENT_LLM_API_KEY
          # 不在仓库中硬编码密钥。可选的 agent-LLM 功能需要此 key。
          # 部署时由 install.sh 从 algo-secrets(DASHSCOPE_API_KEY) 注入，
          # 或改用下面的 secretKeyRef。
          value: ""
          # valueFrom:
          #   secretKeyRef: {name: algo-secrets, key: DASHSCOPE_API_KEY, optional: true}

        - name: AGENT_LLM_PROXY
          # 只给 LLM 请求使用的代理
          value: "http://50.67.92.157:10086"
        - name: AGENT_LLM_SSL_VERIFY
          # 内网 MITM 常见：0=不校验证书（仅 LLM 生效）
          value: "0"

        # --- 卷挂载 (Volume Mounts) ---
        volumeMounts:
        - name: db-volume
          # 将卷挂载到容器内的 /db 目录
          mountPath: /db
        # [新增] 挂载模型目录到容器内的 /models
        - name: models-volume
          mountPath: /models

      # -------------------------------
      # ✅ [新增] log-collector 独立采集进程
      # 与 api-server 共享同一个镜像、同一份 DB、同一个 ServiceAccount
      # 负责 follow=True 流式读取 K8s Pod 日志并逐行写入 DB
      # 不对外暴露任何端口，纯后台进程
      # -------------------------------
      - name: log-collector
        # 与 api-server 使用完全相同的镜像
        image: localhost:5000/leaderboard-api:v1
        imagePullPolicy: Always
        # 覆盖默认启动命令，直接运行采集脚本
        command: ["python", "log_collector.py"]
        env:
        - name: DATABASE_URL
          # 与 api-server 共用同一个 SQLite 文件（挂载同一个 db-volume）
          value: "sqlite:////db/leaderboard.db"
        - name: K8S_NAMESPACE
          value: "leaderboard"
        - name: no_proxy
          value: "localhost,127.0.0.1,.svc,.svc.cluster.local"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,.svc,.svc.cluster.local"
        # 主循环扫描间隔（秒），默认 10s 扫一次找 Running 任务
        - name: LC_SCAN_INTERVAL
          value: "10"
        # 等待 Pod 出现的最大重试次数（24 次 × 5s = 120s）
        - name: LC_POD_WAIT_RETRIES
          value: "24"
        # 每批次批量写入 DB 的行数，减少 commit 频率
        - name: LC_BATCH_SIZE
          value: "50"
        # --- 卷挂载 (Volume Mounts) ---
        volumeMounts:
        - name: db-volume
          # 必须与 api-server 挂载到同一路径，才能读写同一个 SQLite 文件
          mountPath: /db

      # --- 卷定义 (Volumes) ---
      volumes:
      - name: db-volume
        # 使用 hostPath (宿主机路径)
        hostPath:
          # 路径: 指向你在 node-0 上创建的目录
          path: /home/leaderboard-db
          # 类型: 确保如果目录不存在, K8s 会尝试创建它
          type: DirectoryOrCreate
      # [新增] 定义模型卷，映射宿主机的目录
      - name: models-volume
        hostPath:
          path: /models
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-api-svc # Service 的名字
  namespace: leaderboard
spec:
  # 关键：使用 NodePort 类型
  # 这会在你的节点(宿主机)上打开一个端口 (例如 30001)
  type: NodePort
  selector:
    app: leaderboard-api # 找到所有带 'app: leaderboard-api' 标签的 Pod
  ports:
  - protocol: TCP
    port: 80 # Service 内部集群的端口
    targetPort: 8000 # 转发到 Pod 的 8000 端口
    nodePort: 30001 # 暴露在宿主机上的端口

